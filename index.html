<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dot SCC Templates</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="dist/bundle.css">
</head>
<body>
    <main class="size-full bg-b1">
        <div class="size-full display-c">

            <h2 class="m-15 mb-25">Headlines</h2>
            <div class="display-c ai-c jc-e">
                <div class="display-r size-full-perc ai-c jc-e mb-25">
                    <h1>H1 headline</h1>
                    <h2>H2 headline</h2>
                    <h3>H3 headline</h3>
                    <h4>H4 headline</h4>
                    <h5>H5 headline</h5>
                    <h6>H6 headline</h6>
                </div>
            </div>

            <hr class="m-20">

            <h2 class="m-15 mb-25">Buttons</h2>
            <div class="display-c">
                <div class="display-r size-full-perc p-10 ai-c jc-e mb-25">
                    <button class="style-fill-1 ts-16">Открыть</button>
                    <button class="style-fill-2 ts-16">Открыть</button>
                    <button class="style-fill-3 ts-16">Открыть</button>
                    <button class="style-border-1 ts-16">Открыть</button>
                    <button class="style-border-2 ts-16">Открыть</button>
                    <button class="style-border-3 ts-16">Открыть</button>
                </div>
            </div>
            <div class="display-c">
                <div class="display-r size-full-perc p-10 ai-c jc-e mb-25">
                    <button class="style-fill-success ts-16">Открыть</button>
                    <button class="style-fill-attention ts-16">Открыть</button>
                    <button class="style-fill-error ts-16">Открыть</button>
                    <button class="style-border-success ts-16">Открыть</button>
                    <button class="style-border-attention ts-16">Открыть</button>
                    <button class="style-border-error ts-16">Открыть</button>
                </div>
            </div>
            <div class="display-c" style="background-image: url('src/images/depositphotos_194828412-stock-photo-full-frame-image-green-leaves.jpg')">
                <div class="display-r size-full-perc p-10 ai-c jc-e mb-25">
                    <button class="style-glass-1 ts-16">Открыть</button>
                    <button class="style-glass-2 ts-16">Открыть</button>
                    <button class="style-glass-success ts-16">Открыть</button>
                    <button class="style-glass-attention ts-16">Открыть</button>
                    <button class="style-glass-error ts-16">Открыть</button>
                </div>
            </div>

            <hr class="m-20">

            <h2 class="m-15 mb-25">Checkboxes</h2>
            <div class="display-c" style="background-image: url('src/images/depositphotos_194828412-stock-photo-full-frame-image-green-leaves.jpg')">
                <div class="display-r size-full-perc p-10 ai-c jc-e mb-25">
                    <div class="display-r bg-g2 bc-g2 p-8 pr-12 pl-12 br-15">
                        <input type="checkbox" id="option1" name="group1" value="value1" class="size-18px mr-8 mt-3 br-5">
                        <label for="option1">Choice Label</label>
                    </div>

                </div>
            </div>

            <hr class="m-20">

            <h2 class="m-15 mb-25">Forms</h2>
            <div class="display-c" style="background-image: url('src/images/depositphotos_194828412-stock-photo-full-frame-image-green-leaves.jpg'); background-size: cover;">
                <div class="display-r size-full-perc p-10 ai-c jc-e mb-25">
                    <section class="size-30 size-w-200px display-c bg-g1 bc-g1 ai-c jc-c br-15 p-10">
                        <form>

                            <div class="display-c mb-10">
                                <label for="username" class="pl-10 t-16 ta-s">Логин</label>
                                <input type="text" id="username" name="username" placeholder="your@email.com" required class="p-8 pb-5 t-18 br-15 bg-g2 bc-g2 ta-s placeholder">
                            </div>

                            <div class="display-c mb-15">
                                <label for="pw-login" class="pl-10 t-16 ta-s">Пароль</label>
                                <input type="password" id="pw-login" name="password" placeholder="••••••••" required class="p-8 pb-5 t-18 br-15 bg-g2 bc-g2 ta-s placeholder">
                            </div>

                            <button id="login-submit-button" type="button" class="style-glass-3 size-full-r-perc br-15 hover-accent-2">Войти</button>
                            <br>
                            <br>
                            <a href="/forgot-password" class="size-full-r-perc">Забыли пароль?</a>

                        </form>
                    </section>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
